name: Build Roboto Py Example Deb Package

on:
  push:
    branches: [main, master]
    paths:
      - "**"
      - ".github/workflows/build-deb.yml"
    tags:
      - "py-example-v*"
  pull_request:
    branches: [main, master]
    paths:
      - "**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build deb package
        run: ./build_deb.sh

      - name: Upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: roboto-py-example-deb
          path: roboto-py-example_*.deb

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/py-example-v')
        uses: softprops/action-gh-release@v2
        with:
          files: roboto-py-example_*.deb
