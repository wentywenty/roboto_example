name: Build Roboto Example Deb Package

on:
  push:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y debhelper dh-make

      - name: Build deb package
        run: |
          dpkg-buildpackage -us -uc -b
          mv ../*.deb .
          VERSION=$(dpkg-parsechangelog -S Version | cut -d'-' -f1 || echo "unknown")
          echo "PKG_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: roboto-example-v${{ env.PKG_VERSION }}-all
          path: "*.deb"

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: "*.deb"
